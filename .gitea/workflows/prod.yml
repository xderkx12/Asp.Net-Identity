name: Deploy Prod
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t cafe-identity:prod -f Identity.API/Dockerfile .
      - name: Deploy
        run: cd /opt/cafe && docker compose -f compose.prod.yml up -d
